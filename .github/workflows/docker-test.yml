name: Docker Integration Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docker-stress-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker compose build

      - name: Verify Docker Integration and Connection Sanity
        run: |
          echo "Starting integration check: launching single runtime instance..."
          # Run the app container for exactly 15 seconds to verify startup, connection, and auth initialization
          timeout 15s docker compose run --rm app || item_status=$?

          # timeout returns exit code 124 when it successfully stops a running command. 
          # We assert that 124 is a successful validation path.
          if [ $item_status -eq 124 ] || [ $item_status -eq 0 ]; then
            echo "Integration and authorization checks passed successfully."
            exit 0
          else
            echo "Container exited prematurely with unexpected failure code: $item_status"
            exit 1
          fi
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: https://paper-api.alpaca.markets
